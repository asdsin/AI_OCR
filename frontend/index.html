<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<title>AI 인식 PoC v2</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Malgun Gothic',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;font-size:14px}

.hdr{background:#1e293b;padding:10px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #334155;position:sticky;top:0;z-index:10}
.hdr h1{font-size:16px;font-weight:700;flex:1}
.st{font-size:11px;padding:3px 8px;border-radius:10px}
.st.on{background:#065f46;color:#6ee7b7}.st.off{background:#7f1d1d;color:#fca5a5}

.main{padding:12px;max-width:500px;margin:0 auto}
.card{background:#1e293b;border-radius:10px;padding:12px;margin-bottom:10px}
.card-title{font-size:13px;font-weight:700;color:#94a3b8;margin-bottom:8px}

.btn{display:block;width:100%;padding:12px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;text-align:center;margin-bottom:6px}
.btn-p{background:#3b82f6;color:#fff}.btn-p:active{background:#2563eb}
.btn-g{background:#059669;color:#fff}
.btn-s{background:#334155;color:#e2e8f0}
.btn-d{background:#ef4444;color:#fff}
.btn:disabled{opacity:.4}

.tmpl-card{background:#0f172a;border-radius:8px;padding:10px;margin-bottom:6px;cursor:pointer;border-left:3px solid #3b82f6;transition:all .15s}
.tmpl-card:active{background:#1e3a5f}
.tmpl-card .name{font-weight:700;font-size:14px}.tmpl-card .info{font-size:11px;color:#64748b}

.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700}
.badge-num{background:#065f46;color:#6ee7b7}.badge-sig{background:#78350f;color:#fbbf24}.badge-col{background:#1e3a5f;color:#60a5fa}

.screen{display:none}.screen.active{display:block}

.result-big{font-size:48px;font-weight:900;text-align:center;padding:16px 0}
.result-big.ok{color:#22c55e}.result-big.ng{color:#ef4444}.result-big.error{color:#f59e0b}
.result-label{font-size:28px;font-weight:800;text-align:center;padding:8px;border-radius:8px;margin-bottom:12px}
.result-label.ok{background:#065f46;color:#6ee7b7}.result-label.ng{background:#7f1d1d;color:#fca5a5}.result-label.error{background:#78350f;color:#fbbf24}
.result-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #334155;font-size:13px}
.result-row .label{color:#94a3b8}.result-row .value{font-weight:600}
.loading-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100}
.spinner{width:40px;height:40px;border:4px solid #334155;border-top-color:#3b82f6;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.cam-wrap{position:relative;width:100%;aspect-ratio:4/3;background:#000;border-radius:10px;overflow:hidden;margin-bottom:8px}
.cam-wrap video,.cam-wrap canvas,.cam-wrap img{width:100%;height:100%;object-fit:contain}

#qr-reader{width:100%;border-radius:10px;overflow:hidden;margin-bottom:8px}
#qr-reader video{border-radius:10px}

.roi-canvas{position:absolute;top:0;left:0;width:100%;height:100%;cursor:crosshair;touch-action:none}

.equip-info{background:#0f172a;border-radius:6px;padding:10px;margin-bottom:8px}
.equip-info .name{font-size:16px;font-weight:700;margin-bottom:4px}
.equip-info .meta{font-size:11px;color:#64748b}
</style>
</head>
<body>

<div class="hdr">
  <span style="font-size:20px">🏭</span>
  <h1>AI 인식 PoC v2</h1>
  <span id="stBadge" class="st off">...</span>
</div>

<div class="main">
  <!-- ═══ Screen 1: QR 스캔 ═══ -->
  <div id="s-qr" class="screen active">
    <div class="card">
      <div class="card-title">🏷️ QR 스캔</div>
      <div id="qr-reader"></div>
      <div style="text-align:center;margin:8px 0">
        <span style="color:#64748b;font-size:12px">또는</span>
      </div>
      <div style="display:flex;gap:6px">
        <input id="qrInput" placeholder="QR값 직접 입력..." style="flex:1;padding:10px;background:#0f172a;border:1px solid #334155;border-radius:6px;color:#e2e8f0;font-size:14px">
        <button class="btn btn-p" style="width:auto;padding:10px 16px" onclick="lookupQr()">조회</button>
      </div>
      <div id="qrError" style="display:none;margin-top:8px;padding:8px;background:#7f1d1d;border-radius:6px;color:#fca5a5;font-size:12px"></div>
    </div>
  </div>

  <!-- ═══ Screen 2: 설비 정보 + 템플릿 선택 ═══ -->
  <div id="s-equip" class="screen">
    <div class="card">
      <div class="equip-info" id="equipInfo"></div>
      <div class="card-title">📋 검사 항목 선택</div>
      <div id="tmplList"></div>
    </div>
    <button class="btn btn-s" onclick="goScreen('s-qr');stopCamera()">← QR 다시 스캔</button>
  </div>

  <!-- ═══ Screen 3: 카메라 촬영 ═══ -->
  <div id="s-camera" class="screen">
    <div class="card">
      <div class="card-title">📸 PLC 화면 촬영</div>
      <div id="ruleInfo" style="font-size:12px;color:#94a3b8;margin-bottom:6px"></div>
      <div class="cam-wrap" id="camWrap">
        <video id="camVideo" autoplay playsinline muted></video>
      </div>
      <button class="btn btn-d" id="btnCapture" onclick="captureImage()">📸 촬영</button>
    </div>
    <button class="btn btn-s" onclick="goScreen('s-equip');stopCamera()">← 항목 선택으로</button>
  </div>

  <!-- ═══ Screen 4: 촬영 확인 + ROI 지정 ═══ -->
  <div id="s-roi" class="screen">
    <div class="card">
      <div class="card-title">🔲 판독 영역(ROI) 확인</div>
      <div id="roiRuleInfo" style="font-size:12px;color:#94a3b8;margin-bottom:6px"></div>
      <div class="cam-wrap" id="roiWrap" style="cursor:crosshair">
        <canvas id="roiCanvas"></canvas>
        <canvas id="roiOverlay" class="roi-canvas"></canvas>
      </div>
      <div style="font-size:11px;color:#64748b;margin-bottom:6px" id="roiCoords">ROI: 드래그로 영역을 지정하세요</div>
      <button class="btn btn-g" id="btnJudge" onclick="startJudgment()" disabled>🔍 판정 시작</button>
      <button class="btn btn-s" onclick="retakeImage()">↩️ 재촬영</button>
    </div>
  </div>

  <!-- ═══ Screen 5: 판정 결과 ═══ -->
  <div id="s-result" class="screen">
    <div class="card" id="resultCard"></div>
    <button class="btn btn-p" onclick="retakeImage()">📸 재촬영</button>
    <button class="btn btn-s" onclick="goScreen('s-equip')">← 항목 선택으로</button>
    <button class="btn btn-s" onclick="goScreen('s-qr')">← QR 다시 스캔</button>
  </div>

  <!-- 로딩 오버레이 -->
  <div id="loadingOverlay" class="loading-overlay" style="display:none">
    <div class="spinner"></div>
    <div style="margin-top:16px;color:#94a3b8" id="loadingText">분석 중...</div>
  </div>
</div>

<script>
// ═══ 앱 상태 ═══
const appState = {
  equipment: null,
  selectedTemplate: null,
  selectedRule: null,
  capturedImage: null,  // base64
  roi: null,            // {x, y, w, h} (% 단위)
  judgmentType: null,
  ocrResult: null,
  judgmentResult: null,
};

const API = location.origin;

// ═══ API 유틸 ═══
async function apiCall(path, opts = {}) {
  const res = await fetch(API + path, { headers: {'Content-Type':'application/json'}, ...opts });
  if (!res.ok) { const t = await res.text(); throw new Error(`${res.status}: ${t.slice(0,200)}`); }
  return res.json();
}

// ═══ 화면 전환 ═══
function goScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ═══ 서버 연결 확인 ═══
async function checkServer() {
  const b = document.getElementById('stBadge');
  try {
    await apiCall('/health');
    b.textContent = '연결됨'; b.className = 'st on';
  } catch(e) {
    b.textContent = '연결실패'; b.className = 'st off';
  }
}

// ═══════════════════════════════════
// Screen 1: QR 스캔
// ═══════════════════════════════════
let qrScanner = null;

function initQrScanner() {
  qrScanner = new Html5Qrcode("qr-reader");
  qrScanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: { width: 200, height: 200 } },
    onQrSuccess,
    () => {} // ignore errors
  ).catch(e => {
    console.log('QR 카메라 실패:', e);
    document.getElementById('qr-reader').innerHTML =
      '<div style="padding:20px;text-align:center;color:#64748b;font-size:12px">카메라 사용 불가 — QR값을 직접 입력하세요</div>';
  });
}

function onQrSuccess(qrValue) {
  if (qrScanner) qrScanner.stop().catch(() => {});
  document.getElementById('qrInput').value = qrValue;
  lookupQr();
}

async function lookupQr() {
  const qr = document.getElementById('qrInput').value.trim();
  if (!qr) return;
  const errEl = document.getElementById('qrError');
  errEl.style.display = 'none';
  try {
    const data = await apiCall(`/equipments/by-qr/${encodeURIComponent(qr)}`);
    appState.equipment = data;
    showEquipment(data);
    if (qrScanner) qrScanner.stop().catch(() => {});
    goScreen('s-equip');
  } catch(e) {
    errEl.style.display = 'block';
    errEl.textContent = e.message.includes('404')
      ? `등록되지 않은 설비입니다 (QR: ${qr})`
      : `조회 실패: ${e.message}`;
  }
}

// ═══════════════════════════════════
// Screen 2: 설비 정보 + 템플릿 선택
// ═══════════════════════════════════
function showEquipment(eq) {
  document.getElementById('equipInfo').innerHTML = `
    <div class="name">${eq.equipment_name}</div>
    <div class="meta">${eq.equipment_code} · ${eq.line_name || ''} · ${eq.location_name || ''} · QR: ${eq.qr_value || ''}</div>`;

  const list = document.getElementById('tmplList');
  if (!eq.templates || !eq.templates.length) {
    list.innerHTML = '<div style="color:#64748b;padding:10px;text-align:center">등록된 검사 항목이 없습니다</div>';
    return;
  }
  list.innerHTML = eq.templates.map(t => {
    const bc = t.judgment_type === 'numeric' ? 'badge-num' : t.judgment_type === 'signal' ? 'badge-sig' : 'badge-col';
    const bt = {numeric:'수치형', signal:'신호형', color:'색상형'}[t.judgment_type] || t.judgment_type;
    return `<div class="tmpl-card" onclick="selectTemplate(${t.id})">
      <div class="name">${t.template_name} <span class="badge ${bc}">${bt}</span></div>
      <div class="info">ROI: (${t.roi_x}%, ${t.roi_y}%) ${t.roi_width}%×${t.roi_height}%</div>
    </div>`;
  }).join('');
}

async function selectTemplate(tmplId) {
  const eq = appState.equipment;
  const tmpl = eq.templates.find(t => t.id === tmplId);
  if (!tmpl) return;
  appState.selectedTemplate = tmpl;
  appState.judgmentType = tmpl.judgment_type;

  // 규칙 로딩
  try {
    const rules = await apiCall(`/rules/by-template/${tmplId}`);
    appState.selectedRule = rules.length > 0 ? rules[0] : null;
  } catch(e) {
    appState.selectedRule = null;
  }

  showRuleInfo();
  goScreen('s-camera');
  startCamera();
}

function showRuleInfo() {
  const tmpl = appState.selectedTemplate;
  const rule = appState.selectedRule;
  const bt = {numeric:'수치형', signal:'신호형', color:'색상형'}[tmpl.judgment_type];
  let ruleText = '규칙 없음';
  if (rule) {
    if (rule.judgment_type === 'numeric') ruleText = `${rule.min_value}~${rule.max_value} ${rule.unit || ''}`;
    else if (rule.judgment_type === 'signal') ruleText = `ON≥${rule.signal_on_threshold}, OFF≤${rule.signal_off_threshold}`;
    else if (rule.judgment_type === 'color') ruleText = rule.color_mapping_json || '';
  }
  const html = `📋 ${tmpl.template_name} (${bt}) · 기준: ${ruleText}`;
  document.getElementById('ruleInfo').innerHTML = html;
  document.getElementById('roiRuleInfo').innerHTML = html;
}

// ═══════════════════════════════════
// Screen 3: 카메라 촬영
// ═══════════════════════════════════
let camStream = null;

async function startCamera() {
  try {
    camStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }
    });
    const video = document.getElementById('camVideo');
    video.srcObject = camStream;
    await video.play();
  } catch(e) {
    alert('카메라 접근 실패: ' + e.message);
  }
}

function stopCamera() {
  if (camStream) { camStream.getTracks().forEach(t => t.stop()); camStream = null; }
}

function captureImage() {
  const video = document.getElementById('camVideo');
  const canvas = document.createElement('canvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  appState.capturedImage = canvas.toDataURL('image/jpeg', 0.9);
  stopCamera();
  showRoiScreen();
  goScreen('s-roi');
}

function retakeImage() {
  appState.capturedImage = null;
  appState.roi = null;
  goScreen('s-camera');
  startCamera();
}

// ═══════════════════════════════════
// Screen 4: ROI 지정
// ═══════════════════════════════════
let _roiDragging = false, _roiStart = {}, _roiRect = null;

function showRoiScreen() {
  const img = new Image();
  img.onload = function() {
    const canvas = document.getElementById('roiCanvas');
    const overlay = document.getElementById('roiOverlay');
    const wrap = document.getElementById('roiWrap');

    // 캔버스 크기를 이미지 비율에 맞게
    canvas.width = img.width;
    canvas.height = img.height;
    overlay.width = img.width;
    overlay.height = img.height;

    // 이미지 그리기
    canvas.getContext('2d').drawImage(img, 0, 0);

    // 템플릿에 ROI가 있으면 자동 표시
    const tmpl = appState.selectedTemplate;
    if (tmpl && tmpl.roi_x > 0) {
      _roiRect = {
        x: tmpl.roi_x / 100 * img.width,
        y: tmpl.roi_y / 100 * img.height,
        w: tmpl.roi_width / 100 * img.width,
        h: tmpl.roi_height / 100 * img.height,
      };
      drawRoi();
      saveRoiToState();
    } else {
      _roiRect = null;
      document.getElementById('btnJudge').disabled = true;
    }

    // 드래그 이벤트
    setupRoiDrag(overlay);
  };
  img.src = appState.capturedImage;
}

function setupRoiDrag(overlay) {
  function getPos(e) {
    const rect = overlay.getBoundingClientRect();
    const touch = e.touches ? e.touches[0] : e;
    return {
      x: (touch.clientX - rect.left) / rect.width * overlay.width,
      y: (touch.clientY - rect.top) / rect.height * overlay.height
    };
  }

  overlay.onpointerdown = function(e) {
    _roiDragging = true;
    _roiStart = getPos(e);
    _roiRect = null;
    e.preventDefault();
  };
  overlay.onpointermove = function(e) {
    if (!_roiDragging) return;
    const cur = getPos(e);
    _roiRect = {
      x: Math.min(_roiStart.x, cur.x),
      y: Math.min(_roiStart.y, cur.y),
      w: Math.abs(cur.x - _roiStart.x),
      h: Math.abs(cur.y - _roiStart.y),
    };
    drawRoi();
  };
  overlay.onpointerup = function() {
    _roiDragging = false;
    if (_roiRect && _roiRect.w > 10 && _roiRect.h > 10) {
      saveRoiToState();
    }
  };
}

function drawRoi() {
  const overlay = document.getElementById('roiOverlay');
  const ctx = overlay.getContext('2d');
  ctx.clearRect(0, 0, overlay.width, overlay.height);
  if (!_roiRect) return;

  // 반투명 마스크
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(0, 0, overlay.width, overlay.height);
  // ROI 영역은 투명하게
  ctx.clearRect(_roiRect.x, _roiRect.y, _roiRect.w, _roiRect.h);
  // 빨간 테두리
  ctx.strokeStyle = '#ef4444';
  ctx.lineWidth = 3;
  ctx.strokeRect(_roiRect.x, _roiRect.y, _roiRect.w, _roiRect.h);
  // 모서리 점
  ctx.fillStyle = '#ef4444';
  const corners = [
    [_roiRect.x, _roiRect.y],
    [_roiRect.x + _roiRect.w, _roiRect.y],
    [_roiRect.x, _roiRect.y + _roiRect.h],
    [_roiRect.x + _roiRect.w, _roiRect.y + _roiRect.h],
  ];
  corners.forEach(([cx, cy]) => {
    ctx.beginPath(); ctx.arc(cx, cy, 6, 0, Math.PI*2); ctx.fill();
  });
}

function saveRoiToState() {
  const canvas = document.getElementById('roiCanvas');
  appState.roi = {
    x: Math.round(_roiRect.x / canvas.width * 1000) / 10,
    y: Math.round(_roiRect.y / canvas.height * 1000) / 10,
    w: Math.round(_roiRect.w / canvas.width * 1000) / 10,
    h: Math.round(_roiRect.h / canvas.height * 1000) / 10,
  };
  document.getElementById('roiCoords').textContent =
    `ROI: X=${appState.roi.x}% Y=${appState.roi.y}% W=${appState.roi.w}% H=${appState.roi.h}%`;
  document.getElementById('btnJudge').disabled = false;
}

// ═══════════════════════════════════
// 이미지 전처리 (Canvas API)
// ═══════════════════════════════════
function cropRoi(imgSrc, roi) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const sx = Math.round(roi.x / 100 * img.width);
      const sy = Math.round(roi.y / 100 * img.height);
      const sw = Math.round(roi.w / 100 * img.width);
      const sh = Math.round(roi.h / 100 * img.height);
      const c = document.createElement('canvas');
      c.width = sw; c.height = sh;
      c.getContext('2d').drawImage(img, sx, sy, sw, sh, 0, 0, sw, sh);
      resolve(c);
    };
    img.src = imgSrc;
  });
}

function preprocessCanvas(canvas) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;

  // 업스케일 (글자가 작으면 확대)
  if (Math.max(w, h) < 200) {
    const scale = 400 / Math.max(w, h);
    const c2 = document.createElement('canvas');
    c2.width = Math.round(w * scale); c2.height = Math.round(h * scale);
    c2.getContext('2d').drawImage(canvas, 0, 0, c2.width, c2.height);
    canvas = c2;
  }

  const ctx2 = canvas.getContext('2d');
  const imgData = ctx2.getImageData(0, 0, canvas.width, canvas.height);
  const d = imgData.data;

  // 1. 그레이스케일
  for (let i = 0; i < d.length; i += 4) {
    const g = d[i]*0.299 + d[i+1]*0.587 + d[i+2]*0.114;
    d[i] = d[i+1] = d[i+2] = g;
  }

  // 2. 대비 강화 (contrast stretch)
  let min = 255, max = 0;
  for (let i = 0; i < d.length; i += 4) { min = Math.min(min, d[i]); max = Math.max(max, d[i]); }
  const range = max - min || 1;
  for (let i = 0; i < d.length; i += 4) {
    const v = Math.round((d[i] - min) / range * 255);
    d[i] = d[i+1] = d[i+2] = v;
  }

  // 3. 이진화 (Otsu 간이 버전)
  let sum = 0, cnt = 0;
  for (let i = 0; i < d.length; i += 4) { sum += d[i]; cnt++; }
  const thresh = sum / cnt;  // 평균값 기준
  for (let i = 0; i < d.length; i += 4) {
    const v = d[i] > thresh ? 255 : 0;
    d[i] = d[i+1] = d[i+2] = v;
  }

  ctx2.putImageData(imgData, 0, 0);

  // 4. 패딩 (가장자리 보호)
  const pad = 15;
  const padded = document.createElement('canvas');
  padded.width = canvas.width + pad*2;
  padded.height = canvas.height + pad*2;
  const pctx = padded.getContext('2d');
  pctx.fillStyle = '#fff';
  pctx.fillRect(0, 0, padded.width, padded.height);
  pctx.drawImage(canvas, pad, pad);

  return padded;
}

// ═══════════════════════════════════
// Tesseract.js OCR 실행
// ═══════════════════════════════════
async function runOcr(canvas) {
  const worker = await Tesseract.createWorker('eng', 1, {
    logger: m => {
      if (m.status === 'recognizing text') {
        document.getElementById('loadingText').textContent =
          `OCR 분석 중... ${Math.round((m.progress||0)*100)}%`;
      }
    }
  });
  await worker.setParameters({
    tessedit_char_whitelist: '0123456789.,-',  // 숫자+소수점만
    tessedit_pageseg_mode: '7',  // 한 줄 텍스트
  });
  const { data } = await worker.recognize(canvas);
  await worker.terminate();
  return data;  // {text, confidence, ...}
}

// ═══════════════════════════════════
// 수치형 판정 로직
// ═══════════════════════════════════
function parseNumericValue(rawText) {
  if (!rawText || !rawText.trim()) return null;
  // 후처리: 흔한 OCR 오류 보정
  let t = rawText.trim()
    .replace(/[oO]/g, '0')
    .replace(/[lI|]/g, '1')
    .replace(/[sS]/g, '5')
    .replace(/[,_]/g, '.')
    .replace(/\s/g, '');
  // 숫자+소수점만 추출
  const match = t.match(/-?\d+\.?\d*/);
  return match ? parseFloat(match[0]) : null;
}

function judgeNumeric(value, rule) {
  if (value === null) return { result: 'ERROR', reason: '숫자로 변환할 수 없습니다' };
  if (!rule) return { result: 'ERROR', reason: '판정 규칙이 없습니다' };
  const min = rule.min_value;
  const max = rule.max_value;
  if (min !== null && min !== undefined && value < min)
    return { result: 'NG', reason: `${value} < 최소 ${min}` };
  if (max !== null && max !== undefined && value > max)
    return { result: 'NG', reason: `${value} > 최대 ${max}` };
  return { result: 'OK', reason: `${min}~${max} 범위 내` };
}

// ═══════════════════════════════════
// 판정 시작 (메인 함수)
// ═══════════════════════════════════
async function startJudgment() {
  if (!appState.capturedImage || !appState.roi) return;

  // 로딩 표시
  document.getElementById('loadingOverlay').style.display = 'flex';
  document.getElementById('loadingText').textContent = '이미지 전처리 중...';

  try {
    // 1. ROI 크롭
    const cropped = await cropRoi(appState.capturedImage, appState.roi);

    // 2. 전처리
    document.getElementById('loadingText').textContent = '전처리 중...';
    const processed = preprocessCanvas(cropped);

    // 크롭/전처리 이미지를 base64로 저장 (결과 화면용)
    const cropB64 = cropped.toDataURL('image/jpeg', 0.9);
    const procB64 = processed.toDataURL('image/jpeg', 0.9);

    // 3. OCR 실행 (Tesseract.js → 실패 시 서버 PaddleOCR 폴백)
    document.getElementById('loadingText').textContent = 'OCR 분석 중...';
    let rawText = '', confidence = 0;

    // 3a. Tesseract.js (브라우저)
    try {
      const ocrData = await runOcr(processed);
      rawText = ocrData.text.trim();
      confidence = Math.round(ocrData.confidence) / 100;
    } catch(e) { console.warn('Tesseract.js 실패:', e); }

    // 3b. 결과가 없거나 신뢰도 낮으면 서버 PaddleOCR 폴백
    if (!rawText || confidence < 0.3) {
      document.getElementById('loadingText').textContent = 'PaddleOCR 분석 중...';
      try {
        const roi = appState.roi;
        const blob = await (await fetch(appState.capturedImage)).blob();
        const form = new FormData();
        form.append('image', blob, 'capture.jpg');
        form.append('x_pct', roi.x); form.append('y_pct', roi.y);
        form.append('w_pct', roi.w); form.append('h_pct', roi.h);
        const srvRes = await fetch(API + '/ocr/multi-zone', { method: 'POST', body: form });
        if (srvRes.ok) {
          const srvData = await srvRes.json();
          if (srvData.value != null) {
            rawText = srvData.text || String(srvData.value);
            confidence = srvData.confidence || 0.9;
          }
        }
      } catch(e) { console.warn('서버 OCR 폴백 실패:', e); }
    }

    // 4. 수치 파싱
    let parsedValue = parseNumericValue(rawText);

    // 4b. 자릿수 포맷 필터 (소수점 복원: 430→43.0)
    const tmpl = appState.selectedTemplate;
    if (parsedValue !== null && tmpl) {
      // 기본 3자리 + 소수점 추정 (규칙의 min/max 범위로 판단)
      const rule = appState.selectedRule;
      if (rule && rule.max_value && parsedValue > rule.max_value * 2) {
        // 값이 기준의 2배 이상이면 소수점이 빠진 것으로 추정
        // 예: max=80, parsed=168 → OK (정상)
        // 예: max=45, parsed=430 → 43.0으로 보정
        const digits = String(Math.round(rule.max_value)).length;
        const rawStr = String(Math.round(parsedValue));
        if (rawStr.length > digits) {
          const intPart = rawStr.substring(0, digits);
          const decPart = rawStr.substring(digits);
          parsedValue = parseFloat(intPart + '.' + decPart);
          rawText += ` (→${parsedValue} 자동보정)`;
        }
      }
    }

    // 5. 판정
    const rule = appState.selectedRule;
    let judgment;
    if (appState.judgmentType === 'numeric') {
      judgment = judgeNumeric(parsedValue, rule);
    } else {
      // signal/color는 Phase 6에서 구현
      judgment = { result: 'ERROR', reason: `${appState.judgmentType}형 판정은 준비 중` };
    }

    // 신뢰도 경고
    let warning = null;
    if (!rawText) warning = '텍스트를 인식하지 못했습니다';
    else if (parsedValue === null) warning = '숫자로 변환할 수 없습니다';
    else if (confidence < 0.5) warning = '인식 신뢰도가 낮습니다. 재촬영을 권장합니다';

    // appState 저장
    appState.ocrResult = { rawText, parsedValue, confidence };
    appState.judgmentResult = judgment.result;

    // 6. 결과 표시
    showResult({
      rawText, parsedValue, confidence, judgment,
      warning, cropB64, procB64,
      rule, template: appState.selectedTemplate,
      equipment: appState.equipment,
    });

  } catch(e) {
    alert('판정 실패: ' + e.message);
  } finally {
    document.getElementById('loadingOverlay').style.display = 'none';
  }

  goScreen('s-result');
}

// ═══════════════════════════════════
// 결과 화면 렌더링
// ═══════════════════════════════════
function showResult(r) {
  const lv = r.judgment.result;  // OK / NG / ERROR
  const lvClass = lv === 'OK' ? 'ok' : lv === 'NG' ? 'ng' : 'error';
  const lvText = lv === 'OK' ? '✅ 정상 (OK)' : lv === 'NG' ? '❌ 이상 (NG)' : '⚠️ 오류 (ERROR)';
  const unit = r.rule?.unit || '';
  const min = r.rule?.min_value ?? '—';
  const max = r.rule?.max_value ?? '—';

  document.getElementById('resultCard').innerHTML = `
    <!-- 판정 결과 큰 글씨 -->
    <div class="result-label ${lvClass}">${lvText}</div>

    <!-- 인식값 -->
    <div class="result-big ${lvClass}">${r.parsedValue !== null ? r.parsedValue : '—'}${unit ? '<span style="font-size:20px;color:#94a3b8"> '+unit+'</span>' : ''}</div>

    <!-- 경고 메시지 -->
    ${r.warning ? `<div style="background:#78350f;color:#fbbf24;padding:8px;border-radius:6px;font-size:12px;margin-bottom:8px;text-align:center">⚠️ ${r.warning}</div>` : ''}

    <!-- ROI 크롭 이미지 -->
    <div style="display:flex;gap:6px;margin-bottom:10px">
      <div style="flex:1;text-align:center">
        <div style="font-size:10px;color:#64748b;margin-bottom:4px">촬영 영역</div>
        <img src="${r.cropB64}" style="max-width:100%;max-height:80px;border-radius:4px;border:1px solid #334155">
      </div>
      <div style="flex:1;text-align:center">
        <div style="font-size:10px;color:#64748b;margin-bottom:4px">전처리 후</div>
        <img src="${r.procB64}" style="max-width:100%;max-height:80px;border-radius:4px;border:1px solid #334155">
      </div>
    </div>

    <!-- 상세 정보 -->
    <div class="result-row"><span class="label">설비</span><span class="value">${r.equipment?.equipment_name || '—'}</span></div>
    <div class="result-row"><span class="label">검사항목</span><span class="value">${r.template?.template_name || '—'}</span></div>
    <div class="result-row"><span class="label">OCR 원문</span><span class="value">"${r.rawText || ''}"</span></div>
    <div class="result-row"><span class="label">파싱 값</span><span class="value">${r.parsedValue !== null ? r.parsedValue : '파싱 실패'}</span></div>
    <div class="result-row"><span class="label">판정 기준</span><span class="value">${min} ~ ${max} ${unit}</span></div>
    <div class="result-row"><span class="label">판정 사유</span><span class="value">${r.judgment.reason}</span></div>
    <div class="result-row"><span class="label">신뢰도</span><span class="value">${Math.round(r.confidence * 100)}%</span></div>
  `;
}

// ═══ PWA 서비스워커 ═══
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// ═══ 초기화 ═══
checkServer();
initQrScanner();
</script>
